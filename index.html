<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantAI - Deteksi Penyakit Daun</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-green-600 mb-4 text-center">Leaf Analyzer AI</h1>
        
        <input type="file" id="imageInput" accept="image/*" class="hidden">
        <button onclick="document.getElementById('imageInput').click()" class="w-full bg-green-500 text-white py-3 rounded-lg font-semibold mb-4">
            📸 Ambil Foto Daun
        </button>

        <div id="previewContainer" class="hidden mb-4">
            <img id="imagePreview" class="w-full h-48 object-cover rounded-lg border">
            <button id="analyzeBtn" class="w-full mt-2 bg-blue-600 text-white py-2 rounded-lg">Analisis Sekarang</button>
        </div>

        <div id="result" class="p-4 bg-gray-50 rounded-lg hidden text-sm whitespace-pre-wrap">
            Sedang menganalisis...
        </div>
    </div>

    <script>
        const input = document.getElementById('imageInput');
        const preview = document.getElementById('imagePreview');
        const container = document.getElementById('previewContainer');
        const resultDiv = document.getElementById('result');
        const analyzeBtn = document.getElementById('analyzeBtn');

        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                container.classList.remove('hidden');
                resultDiv.classList.add('hidden');
            }
        };

        analyzeBtn.onclick = async () => {
            const file = input.files[0];
            const reader = new FileReader();
            
            resultDiv.classList.remove('hidden');
            resultDiv.innerText = "⏳ Sedang memproses gambar...";
            analyzeBtn.disabled = true;

            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];
                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        body: JSON.stringify({ image: base64Data }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                    const data = await response.json();
                    resultDiv.innerText = data.analysis || "Gagal mendapatkan hasil.";
                } catch (err) {
                    resultDiv.innerText = "Error: " + err.message;
                } finally {
                    analyzeBtn.disabled = false;
                }
            };
            reader.readAsDataURL(file);
        };
    </script>
</body>
          </html>
