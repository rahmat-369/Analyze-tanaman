<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Analyzer AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-4 font-sans">

    <div class="w-full max-w-md bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700">
        <h1 class="text-2xl font-black text-center mb-2 text-green-400">PLANT DETECT AI</h1>
        <p class="text-slate-400 text-center text-xs mb-6 uppercase tracking-widest">Botany Diagnostic Tool</p>

        <input type="file" id="imageInput" accept="image/*" class="hidden">
        <div id="dropZone" onclick="document.getElementById('imageInput').click()" 
             class="border-2 border-dashed border-slate-600 rounded-xl p-8 text-center cursor-pointer hover:border-green-500 bg-slate-700/30">
            <p class="text-3xl mb-2">🌿</p>
            <p class="text-xs text-slate-300">Ambil foto atau pilih dari galeri</p>
        </div>

        <div id="previewContainer" class="hidden mt-6">
            <img id="imagePreview" class="w-full h-48 object-cover rounded-xl border border-slate-600">
            <button id="analyzeBtn" class="w-full mt-4 bg-green-500 hover:bg-green-600 text-slate-900 font-bold py-3 rounded-xl uppercase transition-all">
                Mulai Analisis
            </button>
        </div>

        <div id="resultBox" class="hidden mt-6 p-4 bg-slate-900 rounded-xl border border-slate-700">
            <div id="status" class="text-green-400 font-mono text-xs mb-2"></div>
            <div id="textContent" class="text-slate-200 text-sm leading-relaxed whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('imageInput');
        const preview = document.getElementById('imagePreview');
        const container = document.getElementById('previewContainer');
        const resultBox = document.getElementById('resultBox');
        const status = document.getElementById('status');
        const textContent = document.getElementById('textContent');
        const analyzeBtn = document.getElementById('analyzeBtn');

        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                container.classList.remove('hidden');
                resultBox.classList.add('hidden');
            }
        };

        analyzeBtn.onclick = async () => {
            const file = input.files[0];
            if (!file) return;

            analyzeBtn.disabled = true;
            analyzeBtn.innerText = "Processing...";
            resultBox.classList.remove('hidden');
            status.innerText = "> Mengompres gambar...";

            try {
                // PROSES KOMPRESI GAMBAR (Penting agar tidak di-reject)
                const base64Data = await compressImage(file);
                
                status.innerText = "> AI sedang menganalisis...";
                
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        image: base64Data.split(',')[1],
                        mime: "image/jpeg"
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || data.error);

                status.innerText = "> HASIL DIAGNOSIS:";
                textContent.innerText = data.analysis;
            } catch (err) {
                status.innerText = "> ERROR TERDETEKSI:";
                textContent.innerText = err.message;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerText = "Mulai Analisis";
            }
        };

        // FUNGSI KOMPRESI: Mengecilkan gambar ke lebar 800px agar ringan
        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); // Kualitas 70%
                    };
                };
            });
        }
    </script>
</body>
    </html>
