<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Analyzer AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-4 font-sans">

    <div class="w-full max-w-md bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700 my-auto">
        <h1 class="text-2xl font-black text-center mb-2 text-green-400">PLANT DETECT AI</h1>
        <p class="text-slate-400 text-center text-[10px] mb-6 tracking-widest uppercase">Powered by Gemini 2.5 Flash</p>

        <input type="file" id="imageInput" accept="image/*" class="hidden">
        <div id="dropZone" onclick="document.getElementById('imageInput').click()" 
             class="border-2 border-dashed border-slate-600 rounded-xl p-8 text-center cursor-pointer hover:border-green-500 bg-slate-700/30 transition-all">
            <p class="text-4xl mb-2">🌿</p>
            <p class="text-xs text-slate-300">Pilih foto daun untuk dianalisis</p>
        </div>

        <div id="previewContainer" class="hidden mt-6">
            <img id="imagePreview" class="w-full h-52 object-cover rounded-xl border border-slate-600">
            <button id="analyzeBtn" class="w-full mt-4 bg-green-500 hover:bg-green-600 text-slate-900 font-black py-4 rounded-xl uppercase transition-all shadow-lg active:scale-95">
                Mulai Analisis
            </button>
        </div>

        <div id="resultBox" class="hidden mt-6 p-5 bg-slate-950 rounded-xl border border-slate-700 shadow-inner max-h-[500px] overflow-y-auto">
            <div id="status" class="text-green-400 font-mono text-[10px] mb-3 uppercase tracking-widest border-b border-slate-800 pb-1"></div>
            <div id="textContent" class="text-slate-200 text-sm leading-relaxed whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('imageInput');
        const preview = document.getElementById('imagePreview');
        const container = document.getElementById('previewContainer');
        const resultBox = document.getElementById('resultBox');
        const status = document.getElementById('status');
        const textContent = document.getElementById('textContent');
        const analyzeBtn = document.getElementById('analyzeBtn');

        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                container.classList.remove('hidden');
                resultBox.classList.add('hidden');
            }
        };

        analyzeBtn.onclick = async () => {
            const file = input.files[0];
            if (!file) return;

            analyzeBtn.disabled = true;
            analyzeBtn.innerText = "⏳ MENGANALISIS...";
            resultBox.classList.remove('hidden');
            status.innerText = "● Memproses Gambar...";
            textContent.innerText = "Tunggu sebentar...";

            try {
                const base64Data = await compressImage(file);
                status.innerText = "● Menghubungi AI...";
                
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        image: base64Data.split(',')[1],
                        mime: "image/jpeg"
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(data.detail || data.error);

                status.innerText = "● HASIL ANALISIS SELESAI";

                // PARSER SEDERHANA UNTUK MARKDOWN
                let formattedText = data.analysis
                    .replace(/\*\*(.*?)\*\*/g, '<b class="text-green-400 text-base">$1</b>') // Tebal & Hijau
                    .replace(/---/g, '<hr class="border-slate-800 my-4">') // Horizontal line
                    .replace(/\* /g, '<br>• '); // Bullet points

                textContent.innerHTML = formattedText;
                resultBox.scrollTop = 0;
            } catch (err) {
                status.innerText = "● ERROR";
                textContent.innerHTML = `<span class="text-red-400 font-bold">${err.message}</span>`;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerText = "Analisis Ulang";
            }
        };

        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000; 
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8));
                    };
                };
            });
        }
    </script>
</body>
    </html>
