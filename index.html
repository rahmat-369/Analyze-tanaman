<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant Analyzer AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-md bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700">
        <h1 class="text-2xl font-black text-center mb-2 text-green-400 italic">PLANT DETECT <span class="text-white text-xs px-2 py-1 bg-green-600 rounded">v1.0</span></h1>
        <p class="text-slate-400 text-center text-sm mb-6">Analisis penyakit daun via Gemini AI</p>

        <input type="file" id="imageInput" accept="image/*" class="hidden">
        <div id="dropZone" onclick="document.getElementById('imageInput').click()" 
             class="border-2 border-dashed border-slate-600 rounded-xl p-8 text-center cursor-pointer hover:border-green-500 transition-all bg-slate-700/50">
            <p class="text-4xl mb-2">🌿</p>
            <p class="text-sm font-medium">Klik untuk pilih gambar dari galeri</p>
        </div>

        <div id="previewContainer" class="hidden mt-6">
            <img id="imagePreview" class="w-full h-56 object-cover rounded-xl border-2 border-slate-600">
            <button id="analyzeBtn" class="w-full mt-4 bg-green-500 hover:bg-green-600 text-slate-900 font-bold py-3 rounded-xl transition-all uppercase tracking-widest">
                Mulai Analisis
            </button>
        </div>

        <div id="resultBox" class="hidden mt-6 p-4 bg-slate-900 rounded-xl border border-slate-700">
            <div id="status" class="text-green-400 font-mono text-sm mb-2 animate-pulse"></div>
            <div id="textContent" class="text-slate-200 text-sm leading-relaxed whitespace-pre-wrap"></div>
        </div>
    </div>

    <script>
        const input = document.getElementById('imageInput');
        const preview = document.getElementById('imagePreview');
        const container = document.getElementById('previewContainer');
        const resultBox = document.getElementById('resultBox');
        const status = document.getElementById('status');
        const textContent = document.getElementById('textContent');
        const analyzeBtn = document.getElementById('analyzeBtn');

        input.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    preview.src = event.target.result;
                    container.classList.remove('hidden');
                    resultBox.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        analyzeBtn.onclick = async () => {
            const file = input.files[0];
            if (!file) return;

            // Reset UI
            analyzeBtn.disabled = true;
            analyzeBtn.innerText = "Processing...";
            resultBox.classList.remove('hidden');
            status.innerText = "> Mengompres gambar...";
            textContent.innerText = "";

            try {
                // Konversi ke Base64 (Resize otomatis oleh browser via canvas jika perlu)
                const base64Data = await convertToBase64(file);
                
                status.innerText = "> AI sedang berpikir...";
                
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Data.split(',')[1] })
                });

                const data = await response.json();

                if (response.ok) {
                    status.innerText = "> Hasil Analisis:";
                    textContent.innerText = data.analysis;
                } else {
                    throw new Error(data.error || "Gagal menghubungi AI");
                }
            } catch (err) {
                status.innerText = "> Error!";
                textContent.innerText = err.message;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerText = "Mulai Analisis";
            }
        };

        // Fungsi bantu untuk handle file
        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }
    </script>
</body>
    </html>
